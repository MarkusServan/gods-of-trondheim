<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gods of Trondheim</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: #000;
            color: #f5f5f5;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ─────────────────────────────────────── */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8rem 2rem 2.5rem;
        }

        .site-title {
            font-size: clamp(2.5rem, 6vw, 5rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #f5f5f5;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        /* ── Nav bar ─────────────────────────────────────── */
        .nav-wrapper {
            width: 100%;
            max-width: 1200px;
        }

        .nav-rule {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, #666, transparent);
            border: none;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: clamp(2rem, 5vw, 6rem);
            padding: 1.25rem 0;
            flex-wrap: wrap;
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0.35rem 0.1rem;
            position: relative;
            transition: color 0.25s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: #f5f5f5;
            transition: width 0.25s ease;
        }

        nav a:hover {
            color: #f5f5f5;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* ── Main content placeholder ────────────────────── */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem;
            min-height: 60vh;
            color: #333;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="site-title">Gods of Trondheim</h1>
        <div class="nav-wrapper">
            <hr class="nav-rule">
            <nav>
          <a href="#">BUDDISM</a>
                <a href="#">CHRISTIANITY</a>
                <a href="#">HINDUSIM</a>
          <a href="./occultism/OTO_INDEX.html">OCCULTISM</a>
                <a href="#">SAPMI</a>
            </nav>
            <hr class="nav-rule">
        </div>
    </header>

    <main>
        <!-- your content goes here -->
    </main>

</body>
</html>
